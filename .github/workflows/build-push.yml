name: Build, push, and deploy

on:
  push:
    branches: [main]
    paths-ignore: [README.md]

permissions:
  contents: read

concurrency:
  group: bidly-auction-frontend-build
  cancel-in-progress: true

env:
  IMAGE: aididalam/bidly-frontend-auction
  GITOPS_REPOSITORY: aididalam/bidly-argo-cd
  DEPLOYMENT_FILE: apps/auction-frontend/deployment.yaml
  DESTINATION_RULE_FILE: apps/auction-frontend/destination-rule.yaml
  VIRTUAL_SERVICE_FILE: apps/auction-frontend/virtual-service.yaml
  STABLE_WEIGHT: 50
  CANARY_WEIGHT: 50

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Test
        run: make test TAG=ci

      - id: image
        name: Set image tag
        run: echo "tag=main-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: aididalam
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: make build TAG="${{ steps.image.outputs.tag }}"

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.BIDLY_GITOPS_TOKEN }}
          path: gitops

      - name: Update GitOps latest deployment
        working-directory: gitops
        env:
          TAG: ${{ steps.image.outputs.tag }}
        run: |
          VERSION="v${TAG#main-}"
          sed -i "s|image: $IMAGE:.*|image: $IMAGE:$TAG|" "$DEPLOYMENT_FILE"
          sed -i "/^metadata:/,/^spec:/ s|app.kubernetes.io/version: .*|app.kubernetes.io/version: $VERSION|" "$DEPLOYMENT_FILE"
          sed -i "/^    metadata:/,/^    spec:/ s|app.kubernetes.io/version: .*|app.kubernetes.io/version: $VERSION|" "$DEPLOYMENT_FILE"
          sed -i -E "0,/^([[:space:]]*- name: ).*/! s/^([[:space:]]*- name: ).*/\1$VERSION/" "$DESTINATION_RULE_FILE"
          sed -i -E "0,/^([[:space:]]*app.kubernetes.io\\/version: ).*/! s/^([[:space:]]*app.kubernetes.io\\/version: ).*/\1$VERSION/" "$DESTINATION_RULE_FILE"
          sed -i -E "0,/^([[:space:]]*subset: ).*/! s/^([[:space:]]*subset: ).*/\1$VERSION/" "$VIRTUAL_SERVICE_FILE"
          sed -i -E "0,/^([[:space:]]*weight: ).*/ s/^([[:space:]]*weight: ).*/\1$STABLE_WEIGHT/" "$VIRTUAL_SERVICE_FILE"
          sed -i -E "/subset: $VERSION/,/weight:/ s/^([[:space:]]*weight: ).*/\1$CANARY_WEIGHT/" "$VIRTUAL_SERVICE_FILE"
          grep -q "image: $IMAGE:$TAG" "$DEPLOYMENT_FILE"
          test "$(grep -c "app.kubernetes.io/version: $VERSION" "$DEPLOYMENT_FILE")" -eq 2
          grep -q -- "- name: $VERSION" "$DESTINATION_RULE_FILE"
          grep -q "app.kubernetes.io/version: $VERSION" "$DESTINATION_RULE_FILE"
          grep -q "subset: $VERSION" "$VIRTUAL_SERVICE_FILE"
          grep -q "weight: $STABLE_WEIGHT" "$VIRTUAL_SERVICE_FILE"
          grep -q "weight: $CANARY_WEIGHT" "$VIRTUAL_SERVICE_FILE"
          sed -n '1,80p' "$DEPLOYMENT_FILE"
          sed -n '1,80p' "$DESTINATION_RULE_FILE"
          sed -n '1,80p' "$VIRTUAL_SERVICE_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DEPLOYMENT_FILE" "$DESTINATION_RULE_FILE" "$VIRTUAL_SERVICE_FILE"
          git diff --cached --quiet && exit 0
          git commit -m "ci: deploy auction frontend $TAG"
          for attempt in 1 2 3; do
            git push origin HEAD:main && exit 0
            git pull --rebase origin main
          done
          exit 1
