name: Build, push, and deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bidly-auction-frontend-build
  cancel-in-progress: false

env:
  IMAGE: aididalam/bidly-frontend-auction
  GITOPS_REPOSITORY: aididalam/bidly-argo-cd
  DEPLOYMENT_FILE: apps/auction-frontend/deployment.yaml

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Test
        run: make test TAG=ci

      - id: image
        name: Set image tag
        run: echo "tag=main-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: aididalam
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: make build TAG="${{ steps.image.outputs.tag }}"

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.BIDLY_GITOPS_TOKEN }}
          path: gitops

      - name: Update GitOps image tag
        working-directory: gitops
        env:
          TAG: ${{ steps.image.outputs.tag }}
        run: |
          sed -i "s|image: $IMAGE:.*|image: $IMAGE:$TAG|" "$DEPLOYMENT_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DEPLOYMENT_FILE"
          git diff --cached --quiet && exit 0
          git commit -m "ci: deploy auction frontend $TAG"
          for attempt in 1 2 3; do
            git push origin HEAD:main && exit 0
            git pull --rebase origin main
          done
          exit 1
